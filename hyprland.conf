# Bearded Theme — Aquarelle Lilac
# Only sets window border colors. Gaps, rounding, blur, shadow and animations
# are intentionally left to the Omarchy defaults (looknfeel.conf).

$activeBorderColor = rgb(9587ff) rgb(bcb1f1) 270deg
$inactiveBorderColor = rgba(302f42aa)

general {
    col.active_border = $activeBorderColor
    col.inactive_border = $inactiveBorderColor
}

group {
    col.border_active = $activeBorderColor
    col.border_inactive = $inactiveBorderColor
}
